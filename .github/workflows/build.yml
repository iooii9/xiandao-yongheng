name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
      - run: NODE_OPTIONS="--max-old-space-size=4096" npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
